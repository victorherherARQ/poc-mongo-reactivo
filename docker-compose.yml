services:
  mongo:
    image: mongo:7
    container_name: poc-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            var status = rs.status();
            if (status.ok === 1) { quit(0); }
            else { quit(1); }
          } catch(e) {
            try { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}); quit(0); }
            catch(ie) { quit(1); }
          }
        "
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

volumes:
  mongo-data:
